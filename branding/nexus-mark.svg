<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="nexus-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Abstract N made of connected nodes -->
  <g stroke="url(#nexus-gradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left vertical -->
    <line x1="128" y1="384" x2="128" y2="128"/>
    <!-- Right vertical -->
    <line x1="384" y1="128" x2="384" y2="384"/>
    <!-- Diagonal -->
    <line x1="128" y1="128" x2="384" y2="384"/>
    <!-- Cross connections -->
    <line x1="128" y1="256" x2="256" y2="192"/>
    <line x1="256" y1="320" x2="384" y2="256"/>
    <line x1="256" y1="192" x2="256" y2="320"/>
    <line x1="128" y1="192" x2="256" y2="256"/>
    <line x1="256" y1="256" x2="384" y2="192"/>
  </g>
  <!-- Nodes -->
  <g fill="url(#nexus-gradient)">
    <circle cx="128" cy="128" r="8"/>
    <circle cx="128" cy="256" r="6"/>
    <circle cx="128" cy="384" r="8"/>
    <circle cx="384" cy="128" r="8"/>
    <circle cx="384" cy="256" r="6"/>
    <circle cx="384" cy="384" r="8"/>
    <circle cx="256" cy="192" r="6"/>
    <circle cx="256" cy="256" r="7"/>
    <circle cx="256" cy="320" r="6"/>
    <circle cx="128" cy="192" r="5"/>
    <circle cx="384" cy="192" r="5"/>
  </g>
</svg>
